server {
    listen 80;
    listen [::]:80;
    server_name sessionaiagent.com www.sessionaiagent.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name sessionaiagent.com www.sessionaiagent.com;

    ssl_certificate /etc/letsencrypt/live/sessionaiagent.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sessionaiagent.com/privkey.pem;

    root /var/www/session-agent/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(png|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /setup.sh {
        types { } default_type text/plain;
        expires -1;
        add_header Cache-Control "no-store";
    }
}
